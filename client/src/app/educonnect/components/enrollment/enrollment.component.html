<div class="container main-content">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-soft">
        <div class="card-header bg-white">
          <h5 class="mb-0">Add Enrollment</h5>
        </div>

        <div class="card-body">
          <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">
            <div class="row g-3">
              <!-- Student ID -->
              <div class="col-12 col-md-6">
                <label class="form-label">Student ID</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="studentId"
                  placeholder="Enter Student ID"
                />
                <!-- use bracket access on f['studentId'] -->
                <small class="text-danger d-block mt-1"
                  *ngIf="f['studentId'].touched && f['studentId'].errors?.['required']">
                  Student ID is required.
                </small>
                <small class="text-danger d-block mt-1"
                  *ngIf="f['studentId'].touched && f['studentId'].errors?.['pattern']">
                  Student ID must be a number.
                </small>
              </div>

              <!-- Course ID -->
              <div class="col-12 col-md-6">
                <label class="form-label">Course ID</label>
                <input
                  type="text"
                  class="form-control"
                  formControlName="courseId"
                  placeholder="Enter Course ID"
                />
                <!-- use bracket access on f['courseId'] -->
                <small class="text-danger d-block mt-1"
                  *ngIf="f['courseId'].touched && f['courseId'].errors?.['required']">
                  Course ID is required.
                </small>
                <small class="text-danger d-block mt-1"
                  *ngIf="f['courseId'].touched && f['courseId'].errors?.['pattern']">
                  Course ID must be a number.
                </small>
              </div>

              <!-- Enrollment Date -->
              <div class="col-12 col-md-6">
                <label class="form-label">Enrollment Date</label>
                <input
                  type="date"
                  class="form-control"
                  formControlName="enrollmentDate"
                />
                <!-- use bracket access on f['enrollmentDate'] -->
                <small class="text-danger d-block mt-1"
                  *ngIf="f['enrollmentDate'].touched && f['enrollmentDate'].errors?.['required']">
                  Enrollment date is required.
                </small>
              </div>
            </div>

            <div class="mt-3 d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="enrollmentForm.invalid">
                Add Enrollment
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">
                Reset
              </button>
            </div>
          </form>

          <!-- messages -->
          <div class="mt-3">
            <div class="alert alert-success py-2" *ngIf="successMessage">{{ successMessage }}</div>
            <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
