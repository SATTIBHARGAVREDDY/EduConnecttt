<div class="container py-3">
  <h3 class="mb-3">Edit Teacher</h3>

  <form [formGroup]="teacherForm" (ngSubmit)="onSubmit()">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Username</label>
        <input class="form-control" formControlName="username" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input class="form-control" formControlName="fullName" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Contact Number</label>
        <input class="form-control" formControlName="contactNumber" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input class="form-control" formControlName="email" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Subject</label>
        <input class="form-control" formControlName="subject" />
      </div>

      <div class="col-md-6">
        <label class="form-label">Years of Experience</label>
        <input type="number" class="form-control" formControlName="yearsOfExperience" />
      </div>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Update</button>
    </div>
  </form>

  <div class="mt-3">
    <div class="alert alert-success py-2" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</div>
